project_name: maicos
authors:
  - https://github.com/maicos-devel/maicos/blob/main/AUTHORS.rst
maintainers:
  - schlaicha
  - PicoCentauri
  - hejamu
description:
    Analyse molecular dynamics simulations of interfacial and confined systems.
keywords:
  - Molecular Dynamics
  - Confined Systems
license: GPL-3.0-or-later
project_home: https://github.com/maicos-devel/maicos
documentation_home: https://maicos-analysis.org
documentation_type: UserGuide + API

## Optional entries
install:
  - pip install maicos
src_install:
  - pip install git+https://gitlab.com/maicos-devel/maicos.git
python_requires: ">=3.11"
mdanalysis_requires: ">=2.10.0"
run_tests:
  - git clone latest
  - tox -e tests
test_dependencies:
  - pip install tox
development_status: Beta
